name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Check homepage
        run: curl -sSf -o /dev/null -w "%{http_code}" https://yajur.ai/ | grep -q 200

      - name: Check blog post
        run: curl -sSf -o /dev/null -w "%{http_code}" https://yajur.ai/2026/03/11/building-a-data-lakehouse-for-your-hospital.html | grep -q 200

      - name: Check sitemap
        run: curl -sSf -o /dev/null -w "%{http_code}" https://yajur.ai/sitemap.xml | grep -q 200

      - name: Auto-rollback on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q '\[rollback\]'; then
            echo "::error::Health check failed on a rollback commit. Manual intervention required."
            exit 1
          fi
          echo "Health check failed — triggering rollback..."
          gh workflow run rollback.yml --repo "$REPO" --ref main
