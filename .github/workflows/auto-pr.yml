name: Auto-merge agent branches into dev

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  merge-to-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into dev
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          echo "Merging $BRANCH into dev..."
          git fetch origin dev
          git checkout dev
          git merge --no-ff -X theirs "origin/$BRANCH" -m "Auto-merge: $BRANCH into dev"
          git push origin dev
          echo "Done."
