name: Auto-create and merge Pull Request

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Branch: $BRANCH"

          # Try to create PR — silently ignore error if it already exists
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "Auto PR: $BRANCH" \
            --body "Automatically created from branch \`$BRANCH\`." \
            || echo "PR already exists or could not be created — continuing to merge."

          # Merge by branch name (finds the open PR automatically)
          gh pr merge "$BRANCH" --merge --squash=false
          echo "Merged successfully."
