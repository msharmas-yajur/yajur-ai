name: Auto-create and merge Pull Request

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Branch: $BRANCH"

          # Check for existing open PR
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already open — merging."
          else
            echo "Creating new PR..."
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "Auto PR: $BRANCH" \
              --body "Automatically created from branch \`$BRANCH\`."
          fi

          echo "Merging PR for branch $BRANCH..."
          gh pr merge "$BRANCH" --merge --admin
          echo "Merged successfully."
