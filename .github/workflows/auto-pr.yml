name: Auto-create and merge Pull Request

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "Branch: $BRANCH"

          # Check for an existing open PR
          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found — creating one..."
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --head "$BRANCH" \
              --base main \
              --title "Auto PR: $BRANCH" \
              --body "Automatically created from branch \`$BRANCH\`.")
            echo "Created: $PR_URL"
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi

          echo "PR number: $PR_NUMBER"

          if [ -z "$PR_NUMBER" ]; then
            echo "ERROR: Could not determine PR number."
            exit 1
          fi

          # Merge by explicit PR number
          gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          echo "Merged PR #$PR_NUMBER successfully."

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh workflow run deploy.yml --repo "$REPO" --ref main
          echo "Deploy triggered."
