name: Auto-create and merge Pull Request

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          echo "Branch: $BRANCH"

          # Create PR if none exists; ignore error if it already exists
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "Auto PR: $BRANCH" \
            --body "Automatically created from branch \`$BRANCH\`." \
            2>&1 || true

          # Show current PR state for debugging
          gh pr view "$BRANCH" --json number,state,title

          # Merge the open PR for this branch
          gh pr merge "$BRANCH" --merge
          echo "Merged successfully."
