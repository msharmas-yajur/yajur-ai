name: Promote dev to main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Merge dev into main with changelog
        run: |
          set -e
          git fetch origin dev main

          # Record current main HEAD before merge
          PREV_MAIN=$(git rev-parse origin/main)

          # Merge dev into main
          git checkout main
          git merge --no-ff origin/dev -m "Promote dev to main — $(date -u +%Y-%m-%d)"

          # Generate changelog entry from commits between old main and new merge
          DATE=$(date -u +%Y-%m-%d)
          ENTRY="## $DATE"$'\n'
          COMMITS=$(git log --oneline "$PREV_MAIN"..HEAD --no-merges --pretty=format:"- %s" 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            ENTRY="$ENTRY"$'\n'"- No individual commits (fast-forward or empty merge)"$'\n'
          else
            ENTRY="$ENTRY"$'\n'"$COMMITS"$'\n'
          fi

          # Prepend to CHANGELOG.md (create if missing)
          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (header)
            HEADER=$(head -1 CHANGELOG.md)
            REST=$(tail -n +2 CHANGELOG.md)
            printf '%s\n\n%s\n%s' "$HEADER" "$ENTRY" "$REST" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$ENTRY" > CHANGELOG.md
          fi

          git add CHANGELOG.md
          git commit --amend --no-edit

          git push origin main
          echo "Promoted dev to main with changelog entry for $DATE"
