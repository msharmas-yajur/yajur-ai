title: YAJUR.ai | The Medical Data Infrastructure Company
email: connect@yajur.ai
description: "Yajur.ai is the Medical Data Infrastructure Company. We build disease-specific datasets, AI-driven healthcare applications, and compliance-driven interoperability pipelines that power modern medicine in India and beyond."
author: "Yajur Healthcare"
keywords: "Yajur, Yajur.ai, Yajur Healthcare, medical data infrastructure, healthcare AI, clinical AI, ABDM, NHCX, FHIR, healthcare interoperability, disease-specific datasets, AI-driven healthcare, medical data pipelines, India healthcare technology"
url: "https://yajur.ai"
baseurl: ""

# Clean, category-free post URLs (/:year/:month/:day/:title.html).
# Every post's internal links use this form; the Jekyll default
# (/:categories/...) produced /technology/agentic%20engineering/... URLs that
# 404'd all internal links. jekyll-archives still generates category pages.
permalink: /:year/:month/:day/:title:output_ext

# Hydra Theme Configuration (Manual)
logo: /assets/logo.png

plugins:
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sass-converter

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - copilot

future: true

sass:
  sass_dir: _sass
  style: :expanded
