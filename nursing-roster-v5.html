<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Clinical Rotation Roster — PSNL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   NHS UK DESIGN SYSTEM — TOKEN DEFINITIONS
   Source: service-manual.nhs.uk/design-system/styles
═══════════════════════════════════════════════════════════ */
:root {
  --font: 'Montserrat', Arial, sans-serif;

  /* NHS Colour Palette — Light Mode */
  --nhs-blue:        #005EB8;
  --nhs-dark-blue:   #003087;
  --nhs-bright-blue: #0072CE;
  --nhs-light-blue:  #41B6E6;
  --nhs-aqua:        #00A9CE;
  --nhs-green:       #007F3B;
  --nhs-lt-green:    #78BE20;
  --nhs-yellow:      #FFB81C;
  --nhs-red:         #DA291C;
  --nhs-dark-pink:   #7C2855;
  --nhs-black:       #212B32;
  --nhs-dark-grey:   #425563;
  --nhs-mid-grey:    #768692;
  --nhs-pale-grey:   #E8EDEE;
  --nhs-white:       #FFFFFF;

  /* Semantic tokens — Light */
  --color-bg:          #F0F4F5;   /* BDA recommended off-white */
  --color-surface:     #FFFFFF;
  --color-surface-alt: #F0F4F5;
  --color-border:      #D8DDE0;
  --color-border-form: #4C6272;   /* NHS form input border */
  --color-text:        #212B32;
  --color-text-secondary: #425563;
  --color-text-hint:   #6E7A84;
  --color-link:        #005EB8;
  --color-focus:       #FFB81C;
  --color-error:       #DA291C;
  --color-error-bg:    #FDF0EF;
  --color-success:     #007F3B;
  --color-success-bg:  #E8F4E8;
  --color-warn-bg:     #FFF9E6;
  --color-warn-text:   #594200;

  /* NHS Typography scale */
  --text-xs:    14px;   /* nhsuk-body-s */
  --text-base:  16px;   /* nhsuk-body-m — minimum body */
  --text-lead:  19px;   /* nhsuk-body-l */
  --text-h4:    22px;
  --text-h3:    26px;
  --text-h2:    32px;
  --text-h1:    48px;

  /* NHS Spacing (8px grid) */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 16px;
  --sp-4: 24px;
  --sp-5: 32px;
  --sp-6: 40px;
  --sp-7: 48px;

  /* NHS uses minimal border-radius */
  --radius: 4px;
}

/* Dark mode — NHS doesn't define one officially;
   we follow the same colour logic with dark surfaces */
[data-theme="dark"] {
  --color-bg:          #1A1F25;
  --color-surface:     #232B34;
  --color-surface-alt: #1E252E;
  --color-border:      #354050;
  --color-border-form: #7A9BB5;
  --color-text:        #E8EDEE;
  --color-text-secondary: #9DAEBF;
  --color-text-hint:   #768692;
  --color-link:        #41B6E6;
  --color-focus:       #FFB81C;
  --color-error:       #FF7070;
  --color-error-bg:    #3D1212;
  --color-success:     #78BE20;
  --color-success-bg:  #122A10;
  --color-warn-bg:     #2A2000;
  --color-warn-text:   #FFD96A;

  --nhs-blue:      #41B6E6;
  --nhs-dark-blue: #7DD3F7;
  --nhs-green:     #78BE20;
}

/* ═══════════════════════════════════════════════════════════
   BASE RESET & BODY
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 400;
  line-height: 1.5;
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* NHS Focus style — WCAG 2.2 compliant */
*:focus-visible {
  outline: 3px solid var(--color-focus);
  outline-offset: 0;
}

/* ═══════════════════════════════════════════════════════════
   NHS HEADER
═══════════════════════════════════════════════════════════ */
.nhs-header {
  background: var(--nhs-blue);
  border-bottom: 4px solid var(--nhs-dark-blue);
  padding: 0 var(--sp-4);
  min-height: 64px;
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  position: sticky;
  top: 0;
  z-index: 100;
}
[data-theme="dark"] .nhs-header {
  background: #0B2035;
  border-bottom-color: #41B6E6;
}
.nhs-header-logo {
  background: var(--nhs-white);
  color: var(--nhs-blue);
  font-size: 14px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 3px;
  letter-spacing: .04em;
  flex-shrink: 0;
  line-height: 1;
  white-space: nowrap;
}
.nhs-header-service {
  color: var(--nhs-white);
  flex: 1;
}
.nhs-header-service-name {
  font-size: var(--text-lead);
  font-weight: 700;
  line-height: 1.3;
  display: block;
}
.nhs-header-service-sub {
  font-size: var(--text-xs);
  opacity: .82;
  display: block;
  margin-top: 2px;
}
.nhs-header-actions {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}
.nhs-header-badge {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  font-size: var(--text-xs);
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 3px;
  white-space: nowrap;
}
.theme-toggle {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 3px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  color: #fff;
  transition: background .15s;
}
.theme-toggle:hover { background: rgba(255,255,255,.25); }

/* ═══════════════════════════════════════════════════════════
   PAGE CONTAINER
═══════════════════════════════════════════════════════════ */
.nhs-page {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--sp-5) var(--sp-4);
}

/* ═══════════════════════════════════════════════════════════
   NHS SECTION PANELS
═══════════════════════════════════════════════════════════ */
.nhs-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  margin-bottom: var(--sp-5);
}
.nhs-panel-header {
  background: var(--color-surface-alt);
  border-bottom: 1px solid var(--color-border);
  padding: var(--sp-3) var(--sp-4);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3);
}
.nhs-panel-title {
  font-size: var(--text-h4);
  font-weight: 700;
  color: var(--nhs-blue);
  line-height: 1.3;
}
[data-theme="dark"] .nhs-panel-title { color: var(--nhs-light-blue); }
.nhs-panel-subtitle {
  font-size: var(--text-base);
  color: var(--color-text-secondary);
  margin-top: var(--sp-1);
}

/* ── NHS TABS ── */
.nhs-tabs {
  display: flex;
  border-bottom: 4px solid var(--nhs-blue);
  background: var(--color-surface-alt);
  overflow-x: auto;
  scrollbar-width: none;
}
.nhs-tabs::-webkit-scrollbar { display: none; }
[data-theme="dark"] .nhs-tabs { border-bottom-color: var(--nhs-light-blue); }

.nhs-tab {
  padding: var(--sp-3) var(--sp-4);
  border: none; border-top: 4px solid transparent;
  background: transparent;
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text-secondary);
  cursor: pointer;
  white-space: nowrap;
  display: flex; align-items: center; gap: var(--sp-2);
  transition: background .12s, color .12s;
  margin-bottom: -4px;
}
.nhs-tab:hover {
  background: var(--color-bg);
  color: var(--color-text);
}
.nhs-tab.active {
  background: var(--color-surface);
  color: var(--nhs-blue);
  border-top-color: var(--nhs-blue);
  border-bottom: 4px solid var(--color-surface);
}
[data-theme="dark"] .nhs-tab.active {
  color: var(--nhs-light-blue);
  border-top-color: var(--nhs-light-blue);
}

.nhs-tab-body {
  padding: var(--sp-5) var(--sp-4);
}

/* ── NHS GRID ── */
.nhs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--sp-5);
}
.nhs-col { display: flex; flex-direction: column; gap: var(--sp-3); }

/* ═══════════════════════════════════════════════════════════
   NHS FORM ELEMENTS
═══════════════════════════════════════════════════════════ */

/* Field group */
.nhsuk-form-group {
  margin-bottom: var(--sp-4);
}
.nhsuk-form-group:last-child { margin-bottom: 0; }

/* Label */
.nhsuk-label {
  display: block;
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--sp-2);
  line-height: 1.5;
}

/* Hint */
.nhsuk-hint {
  display: block;
  font-size: var(--text-xs);
  color: var(--color-text-hint);
  margin-bottom: var(--sp-2);
  line-height: 1.5;
}

/* Input */
.nhsuk-input {
  width: 100%;
  padding: var(--sp-2) var(--sp-2);
  border: 2px solid var(--color-border-form);
  border-radius: 0;
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 400;
  color: var(--color-text);
  background: var(--color-surface);
  outline: none;
  line-height: 1.5;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color .12s;
}
.nhsuk-input:focus {
  outline: 3px solid var(--color-focus);
  outline-offset: 0;
  border-color: var(--color-text);
}
[data-theme="dark"] .nhsuk-input {
  background: var(--color-surface-alt);
  color: var(--color-text);
  border-color: var(--color-border-form);
}

/* Textarea */
.nhsuk-textarea {
  width: 100%;
  padding: var(--sp-2);
  border: 2px solid var(--color-border-form);
  border-radius: 0;
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 400;
  color: var(--color-text);
  background: var(--color-surface);
  outline: none;
  line-height: 1.6;
  resize: vertical;
  min-height: 120px;
  appearance: none;
}
.nhsuk-textarea:focus {
  outline: 3px solid var(--color-focus);
  outline-offset: 0;
  border-color: var(--color-text);
}
[data-theme="dark"] .nhsuk-textarea {
  background: var(--color-surface-alt);
  color: var(--color-text);
  border-color: var(--color-border-form);
}

/* Two-column row */
.nhsuk-grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }

/* Inset info box */
.nhsuk-inset-text {
  border-left: 4px solid var(--nhs-blue);
  padding: var(--sp-3);
  background: var(--color-surface-alt);
  font-size: var(--text-base);
  color: var(--color-text-secondary);
  line-height: 1.7;
}
[data-theme="dark"] .nhsuk-inset-text { border-left-color: var(--nhs-light-blue); }

/* Tag / pill */
.nhsuk-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--nhs-blue); color: #fff;
  font-size: var(--text-xs); font-weight: 700;
  padding: 4px 10px;
  border-radius: 3px;
  letter-spacing: .01em;
}
[data-theme="dark"] .nhsuk-tag { background: #0B2035; color: var(--nhs-light-blue); border: 1px solid var(--nhs-light-blue); }

/* Area code badge */
.area-code-badge {
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-base); font-weight: 700;
  border: 2px solid;
  padding: var(--sp-2) 0;
  width: 56px;
  flex-shrink: 0;
}
.area-grid-row {
  display: grid; grid-template-columns: 56px 1fr;
  gap: var(--sp-2); align-items: center;
}

/* ═══════════════════════════════════════════════════════════
   NHS ACTION BAR
═══════════════════════════════════════════════════════════ */
.nhs-action-bar {
  display: flex; flex-wrap: wrap; gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--color-border);
  background: var(--color-surface-alt);
  align-items: center;
}
.nhs-action-bar-right {
  margin-left: auto;
  display: flex; gap: var(--sp-2); flex-wrap: wrap;
}

/* ═══════════════════════════════════════════════════════════
   NHS BUTTONS
═══════════════════════════════════════════════════════════ */
.nhsuk-button {
  display: inline-flex; align-items: center; justify-content: center;
  gap: var(--sp-2);
  padding: 12px 20px;
  border: 2px solid transparent;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, filter .12s;
  text-decoration: none;
  line-height: 1.5;
}
.nhsuk-button:focus-visible {
  outline: 3px solid var(--color-focus);
  outline-offset: 0;
}
.nhsuk-button:disabled { opacity: .5; pointer-events: none; cursor: not-allowed; }

/* Primary — NHS Green */
.nhsuk-button--primary {
  background: var(--nhs-green);
  color: #fff;
  box-shadow: 0 4px 0 #00401E;
}
.nhsuk-button--primary:hover {
  background: #00672F;
  filter: none;
}
.nhsuk-button--primary:active { box-shadow: none; transform: translateY(4px); }
[data-theme="dark"] .nhsuk-button--primary {
  background: var(--nhs-lt-green);
  color: #0A1800;
  box-shadow: 0 4px 0 #4B7C00;
}

/* Secondary — NHS outlined */
.nhsuk-button--secondary {
  background: var(--color-surface);
  color: var(--nhs-blue);
  border-color: var(--nhs-blue);
  box-shadow: none;
}
.nhsuk-button--secondary:hover {
  background: var(--color-bg);
  color: var(--nhs-dark-blue);
  border-color: var(--nhs-dark-blue);
}
[data-theme="dark"] .nhsuk-button--secondary {
  color: var(--nhs-light-blue);
  border-color: var(--nhs-light-blue);
  background: transparent;
}

/* Warning — for print/export */
.nhsuk-button--reverse {
  background: #fff;
  color: var(--nhs-blue);
  border-color: #fff;
  box-shadow: 0 4px 0 #9BA4AA;
}
.nhsuk-button--reverse:hover { background: #f0f0f0; }

/* Large modifier */
.nhsuk-button--large {
  padding: 14px 24px;
  font-size: var(--text-lead);
}

/* Small modifier */
.nhsuk-button--small {
  padding: 8px 14px;
  font-size: var(--text-xs);
}

.nhsuk-button--full { width: 100%; justify-content: center; }

/* ═══════════════════════════════════════════════════════════
   NHS ALERT / CALLOUT PANELS
═══════════════════════════════════════════════════════════ */
.nhsuk-warning-callout {
  background: var(--color-warn-bg);
  border: 2px solid var(--nhs-yellow);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-3);
}
.nhsuk-error-callout {
  background: var(--color-error-bg);
  border: 2px solid var(--color-error);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-3);
}
.nhsuk-success-callout {
  background: var(--color-success-bg);
  border: 2px solid var(--color-success);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-3);
}
.callout-title {
  font-size: var(--text-base);
  font-weight: 700;
  margin-bottom: var(--sp-1);
  display: flex; align-items: center; gap: var(--sp-2);
}
.callout-body {
  font-size: var(--text-base);
  line-height: 1.5;
}
.nhsuk-error-callout .callout-title { color: var(--color-error); }
.nhsuk-success-callout .callout-title { color: var(--color-success); }
.nhsuk-warning-callout .callout-title { color: var(--color-warn-text); }

.alerts-stack { display: flex; flex-direction: column; margin-bottom: var(--sp-4); }

/* ═══════════════════════════════════════════════════════════
   OUTPUT — INSTITUTION HEADER (printed)
═══════════════════════════════════════════════════════════ */
.nhs-inst-header {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-top: 5px solid var(--nhs-blue);
  padding: var(--sp-4) var(--sp-5);
  text-align: center;
  margin-bottom: var(--sp-4);
}
.nhs-inst-name {
  font-size: var(--text-h4);
  font-weight: 700;
  color: var(--nhs-blue);
  margin-bottom: var(--sp-2);
  line-height: 1.3;
}
.nhs-inst-sub {
  font-size: var(--text-lead);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--sp-1);
}
.nhs-inst-meta {
  font-size: var(--text-base);
  color: var(--color-text-secondary);
}
.nhs-inst-period {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  background: var(--nhs-blue);
  color: #fff;
  font-size: var(--text-base);
  font-weight: 700;
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius);
  margin-top: var(--sp-3);
}
[data-theme="dark"] .nhs-inst-period { background: #0B2035; color: var(--nhs-light-blue); border: 1px solid var(--nhs-light-blue); }

/* ═══════════════════════════════════════════════════════════
   STAT SUMMARY CARDS
═══════════════════════════════════════════════════════════ */
.nhs-stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.nhs-stat {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-top: 4px solid var(--nhs-blue);
  padding: var(--sp-3);
  text-align: center;
}
[data-theme="dark"] .nhs-stat { border-top-color: var(--nhs-light-blue); }
.nhs-stat-val {
  font-size: var(--text-h2);
  font-weight: 700;
  color: var(--nhs-blue);
  line-height: 1;
  margin-bottom: var(--sp-1);
}
[data-theme="dark"] .nhs-stat-val { color: var(--nhs-light-blue); }
.nhs-stat-lbl {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ═══════════════════════════════════════════════════════════
   GROUP CARDS
═══════════════════════════════════════════════════════════ */
.nhs-group-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.nhs-group-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: var(--sp-3);
}
.nhs-group-card-title {
  font-size: var(--text-base);
  font-weight: 700;
  margin-bottom: var(--sp-1);
}
.nhs-group-card-sub {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-bottom: var(--sp-2);
  line-height: 1.5;
}
.nhs-group-card-names {
  font-size: var(--text-xs);
  color: var(--color-text);
  line-height: 1.9;
}

/* ═══════════════════════════════════════════════════════════
   LEGEND
═══════════════════════════════════════════════════════════ */
.nhs-legend {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-4);
  display: flex; flex-wrap: wrap; gap: var(--sp-3);
}
.nhs-legend-title {
  width: 100%;
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--color-text-secondary);
  margin-bottom: var(--sp-1);
}
.nhs-legend-item {
  display: flex; align-items: center; gap: var(--sp-2);
  font-size: var(--text-base);
  color: var(--color-text);
}
.nhs-legend-swatch {
  width: 28px; height: 18px;
  border: 1px solid rgba(0,0,0,.15);
  flex-shrink: 0;
}
[data-theme="dark"] .nhs-legend-swatch { border-color: rgba(255,255,255,.1); }

/* ═══════════════════════════════════════════════════════════
   SECTION HEADING
═══════════════════════════════════════════════════════════ */
.nhs-section-heading {
  font-size: var(--text-h4);
  font-weight: 700;
  color: var(--color-text);

const { useState, useCallback, useEffect } = React;

/* ════════════════════ DEVICE DETECTION ════════════════════ */
function getDevice() {
  const w = window.innerWidth;
  if (w <= 480)  return 'xs';   // mobile portrait
  if (w <= 767)  return 'sm';   // mobile landscape
  if (w <= 1023) return 'md';   // tablet portrait
  if (w <= 1279) return 'lg';   // tablet landscape / small desktop
  return 'xl';                   // desktop
}

function useDevice() {
  const [device, setDevice] = useState(getDevice);
  useEffect(() => {
    const handler = () => {
      const d = getDevice();
      setDevice(d);
      document.documentElement.setAttribute('data-device', d);
    };
    handler();
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return device;
}

const isMobile = d => d === 'xs' || d === 'sm';
const isTablet = d => d === 'md' || d === 'lg';

const fmtLong = dt => {
  const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${dt.getDate()} ${M[dt.getMonth()]} ${dt.getFullYear()}`;
};
const DAY = ['Su','Mo','Tu','We','Th','Fr','Sa'];

/* ════════════════════ ALGORITHM ════════════════════ */
function generateRoster(cfg) {
  const students = cfg.studentNames.split('\n').map(s=>s.trim()).filter(Boolean);
  if (students.length < 6) throw new Error('Please enter at least 6 student names.');
  const start = new Date(cfg.startDate+'T00:00:00');
  const end   = new Date(cfg.endDate  +'T00:00:00');
  if (isNaN(start)||isNaN(end)) throw new Error('Please enter valid start and end dates.');
  if (end <= start) throw new Error('End date must be after start date.');
  const totalDays = Math.round((end-start)/86400000)+1;
  if (totalDays < 21) throw new Error(`Minimum 21 days required. Selected: ${totalDays} days.`);

  const dates = [];
  for (let d=0;d<totalDays;d++){
    const dt=new Date(start); dt.setDate(dt.getDate()+d); dates.push(dt);
  }
  const phSet = new Set((cfg.publicHolidays||'').split('\n').map(s=>s.trim()).filter(s=>/^\d{4}-\d{2}-\d{2}$/.test(s)));

  const n=students.length, g0=Math.ceil(n/3), g1=Math.ceil((n-g0)/2), g2=n-g0-g1;
  const groupStudents=[students.slice(0,g0),students.slice(g0,g0+g1),students.slice(g0+g1)];
  const NIGHT_PATS=[['N1','N1','N1','N2','N2','N2'],['N2','N2','N2','N1','N1','N1'],['N1','N1','N1','N2','N2','N2']];
  const PHASES=[{nightRange:[0,5],noDay:6,fixedOff:new Set([7])},{nightRange:[7,12],noDay:13,fixedOff:new Set([6])},{nightRange:[14,19],noDay:20,fixedOff:new Set([6,13])}];

  const schedule={};
  students.forEach(s=>{schedule[s]=[];});

  groupStudents.forEach((grp,gi)=>{
    const {nightRange,noDay,fixedOff}=PHASES[gi];
    const [ns]=nightRange;
    const nightDays=new Set(); for(let d=nightRange[0];d<=nightRange[1];d++) nightDays.add(d);
    const lastDay=totalDays-1;
    const dayShiftDays=[];
    for(let d=0;d<totalDays;d++){
      if(!nightDays.has(d)&&d!==noDay&&!fixedOff.has(d)&&d!==lastDay) dayShiftDays.push(d);
    }
    grp.forEach((student,si)=>{
      const offset=(si%6)*2;
      for(let d=0;d<totalDays;d++){
        const dtStr=fmtISO(dates[d]);
        let cell;
        if(phSet.has(dtStr)){cell='PH';}
        else if(nightDays.has(d)){cell=NIGHT_PATS[gi][d-ns];}
        else if(d===noDay){cell='N/O';}
        else if(fixedOff.has(d)){cell='OFF';}
        else if(d===lastDay){cell='OFF';}
        else{
          const dsIdx=dayShiftDays.indexOf(d);
          cell=dsIdx>=0?POSTING[(dsIdx+offset)%12]:'—';
        }
        schedule[student].push(cell);
      }
    });
  });

  const dailySummary=dates.map((_,d)=>{
    const c={M:0,E:0,G:0,N:0,NO:0,OFF:0,PH:0};
    students.forEach(nm=>{
      const v=schedule[nm][d];
      if(v==='M1'||v==='M2')c.M++; else if(v==='E1'||v==='E2')c.E++;
      else if(v==='G3'||v==='G4')c.G++; else if(v==='N1'||v==='N2')c.N++;
      else if(v==='N/O')c.NO++; else if(v==='OFF')c.OFF++; else if(v==='PH')c.PH++;
    });
    return {...c,date:dates[d],isSun:dates[d].getDay()===0};
  });

  const studentSummaries=students.map((nm,idx)=>{
    const c={M:0,E:0,G:0,N:0,NO:0,OFF:0,PH:0};
    schedule[nm].forEach(v=>{
      if(v==='M1'||v==='M2')c.M++; else if(v==='E1'||v==='E2')c.E++;
      else if(v==='G3'||v==='G4')c.G++; else if(v==='N1'||v==='N2')c.N++;
      else if(v==='N/O')c.NO++; else if(v==='OFF')c.OFF++; else if(v==='PH')c.PH++;
    });
    const gi=idx<g0?0:idx<g0+g1?1:2;
    return{name:nm,...c,work:c.M+c.E+c.G+c.N,rest:c.OFF+c.NO+c.PH,gi,nightOk:c.N>=6,offOk:(c.OFF+c.NO+c.PH)>=2};
  });

  return{schedule,dates,students,groupStudents,groupSizes:[g0,g1,g2],dailySummary,studentSummaries,totalDays,config:cfg};
}

/* ════════════════════ EXCEL EXPORT ════════════════════ */
function exportExcel(roster){
  const{schedule,dates,students,dailySummary,studentSummaries,config:cfg}=roster;
  const rows=[];
  rows.push([cfg.institutionName]);
  rows.push([cfg.rotationTitle]);
  rows.push([`${cfg.batchInfo} — A.Y. ${cfg.academicYear} — ${cfg.hospitalName}`]);
  rows.push([`Clinical Rotation Period: ${fmtDate(dates[0])} to ${fmtDate(dates[dates.length-1])}`]);
  rows.push([]);
  const hdr=['Sl No','Name of the Student'];
  dates.forEach(d=>hdr.push(fmtDate(d)+(d.getDay()===0?'*':'')));
  hdr.push('M','E','G','N','N/O','OFF','Working');
  rows.push(hdr);
  students.forEach((nm,i)=>{
    const row=[i+1,nm];
    dates.forEach((_,d)=>row.push(schedule[nm][d]||''));
    const s=studentSummaries[i];
    row.push(s.M,s.E,s.G,s.N,s.NO,s.OFF,s.work);
    rows.push(row);
  });
  rows.push([]);
  rows.push(['DAILY COVERAGE SUMMARY']);
  const sh=['',''];
  dates.forEach(d=>sh.push(fmtDate(d)+(d.getDay()===0?'*':'')));
  sh.push('TOTAL'); rows.push(sh);
  [['Morning (M)','M'],['Evening (E)','E'],['General (G)','G'],['Night (N)','N'],['Night Off (N/O)','NO'],['Day Off','OFF']].forEach(([lbl,key])=>{
    const row=[lbl,'']; let tot=0;
    dailySummary.forEach(ds=>{row.push(ds[key]||0);tot+=ds[key]||0;});
    row.push(tot); rows.push(row);
  });
  rows.push([]);
  rows.push([[`Areas: M1=${cfg.m1Area} | M2=${cfg.m2Area} | E1=${cfg.e1Area} | E2=${cfg.e2Area} | G3=${cfg.g3Area} | G4=${cfg.g4Area} | N1=${cfg.n1Area} | N2=${cfg.n2Area}`].join('')]);
  rows.push(['M=Morning 7:30-15:30 | E=Evening 11:30-19:30 | G=General 8:00-16:00 | N=Night 19:30-07:30']);
  rows.push(['* = Sunday  |  N/O = Mandatory Night Off']);
  rows.push([]);
  rows.push(['','','','Signature of Subject Co-ordinator:','','','','Signature of the Principal:']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:6},{wch:26},...dates.map(()=>({wch:5.5})),{wch:5},{wch:5},{wch:5},{wch:5},{wch:6},{wch:6},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Rotation Roster');
  XLSX.writeFile(wb,`Nursing_Roster_PSNL_${cfg.academicYear}.xlsx`);
}

    : [{k:'M',l:'M'},{k:'E',l:'E'},{k:'G',l:'G'},{k:'N',l:'N'},{k:'NO',l:'N/O'},{k:'OFF',l:'OFF'},{k:'work',l:'Wk'}];

            <tr>

                  <div style={{fontSize:'7.5px',opacity:.7,fontWeight:400}}>{DAY[dt.getDay()]}</div>
                </th>
              ))}
              {summaryColKeys.map(({k,l})=>(
                <th key={k} className="th-sum">{l}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {students.map((nm,idx)=>{
              const gi=getGI(idx);
              const gc=GC[gi];
              const gcs=dark?gc.dark:gc.light;
              const isFirst=idx===0||idx===g0||idx===g0+g1;
              const ss=studentSummaries[idx];
              return(
                <React.Fragment key={nm}>
                  {isFirst&&(
                    <tr className="grp-hdr">
                      <td className="td-sl"/>
                      <td colSpan={dates.length+8} style={{paddingLeft:12}}>
                        <span style={{
                          display:'inline-flex',alignItems:'center',gap:6,
                          background:gcs.bg,color:gcs.tx,border:`2px solid ${gcs.bdr}`,
                          padding:'2px 10px',fontSize:'10px',fontWeight:700,
                          textTransform:'uppercase',letterSpacing:'.07em',
                        }}>
                          Group {'ABC'[gi]} — Night Duty Week {gi+1}
                          {[' (Days 1–6)',' (Days 8–13)',' (Days 15–20)'][gi]}
                        </span>
                      </td>
                    </tr>
                  )}
                  <tr>
                    <td className="td-sl">{idx+1}</td>
                    <td className="td-name" style={{borderLeft:`4px solid ${gcs.bdr}`}}>{nm}</td>
                    {schedule[nm].map((v,d)=><Cell key={d} v={v} dark={dark}/>)}
                    {summaryColKeys.map(({k},i)=>{
                      const val = k==='work' ? ss.work : ss[k];
                      const isLast = k==='work';
                      return(
                        <td key={k} className={`td-sum${isLast?' td-sum-total':''}`}
                          style={{fontSize:'10.5px',fontWeight:700,color:isLast?'#fff':'var(--color-text-secondary)'}}>
                          {val}
                        </td>
                      );
                    })}
                  </tr>
                </React.Fragment>
              );
            })}
            <tr><td colSpan={dates.length+9} style={{height:6,background:'var(--color-surface-alt)'}}></td></tr>
            {sumRows.map(({k,l})=>(
              <tr key={k} className="sum-row">
                <td className="td-sl"/>
                <td className="td-lbl">{l}</td>
                {dailySummary.map((ds,d)=>(
                  <td key={d} style={{fontSize:'10px',fontWeight:600,
                    background:ds.isSun?(dark?'#1A0A35':'#F0E8FF'):'',
                    color:ds[k]===0?'var(--color-text-hint)':'var(--color-text)'}}>
                    {ds[k]||0}
                  </td>
                ))}
                <td colSpan={summaryColKeys.length} className="td-sum-total" style={{textAlign:'center',fontSize:'10px',fontWeight:700}}>
                  Σ {dailySummary.reduce((a,ds)=>a+(ds[k]||0),0)}

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          <div>🌅 <strong>Morning:</strong> 7:30 AM – 3:30 PM</div>
          <div>🌄 <strong>Evening:</strong> 11:30 AM – 7:30 PM</div>
          <div>☀️ <strong>General:</strong> 8:00 AM – 4:00 PM</div>
          <div>🌙 <strong>Night:</strong> 7:30 PM – 7:30 AM (12 hrs)</div>
        </div>
        <div className="nhsuk-inset-text" style={{borderLeftColor:'var(--nhs-green)',marginTop:'var(--sp-3)'}}>
          <strong>Night rotation pattern:</strong> Students spend 3 consecutive nights in their first
          area (N1), then 3 nights in the second area (N2), ensuring continuous clinical exposure.
          Groups alternate N1→N2 and N2→N1 to ensure both areas are always staffed.
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ HOLIDAYS TAB ════════════════════ */
function HolidaysTab({cfg,setCfg}){
  const set=k=>e=>setCfg(p=>({...p,[k]:e.target.value}));
  const dates=(cfg.publicHolidays||'').split('\n').map(s=>s.trim()).filter(s=>/^\d{4}-\d{2}-\d{2}$/.test(s));
  return(
    <div className="nhs-grid">
      <div className="nhs-col">
        <div style={{fontSize:'var(--text-h4)',fontWeight:700,color:'var(--nhs-blue)',marginBottom:'var(--sp-3)'}}>Public Holidays</div>
        <div className="nhsuk-form-group">
          <label className="nhsuk-label">Holiday Dates</label>
          <span className="nhsuk-hint">Use YYYY-MM-DD format, one date per line</span>
          <textarea className="nhsuk-textarea" value={cfg.publicHolidays} onChange={set('publicHolidays')}
            placeholder={'2026-03-25\n2026-04-02'} style={{minHeight:130}}/>
          <span className="nhsuk-hint" style={{marginTop:'var(--sp-1)'}}>
            {dates.length} holiday{dates.length!==1?'s':''} added. Students will be marked PH.
          </span>
        </div>
        {dates.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:'var(--sp-2)'}}>
            {dates.map(d=>(
              <div key={d} style={{
                display:'flex',alignItems:'center',gap:'var(--sp-2)',
                padding:'var(--sp-2) var(--sp-3)',background:'var(--color-success-bg)',
                border:'2px solid var(--color-success)',
                fontSize:'var(--text-base)',color:'var(--color-text)',fontWeight:500,
              }}>🌿 {d}</div>
            ))}
          </div>
        )}
      </div>
      <div className="nhs-col">
        <div style={{fontSize:'var(--text-h4)',fontWeight:700,color:'var(--nhs-blue)',marginBottom:'var(--sp-3)'}}>How Public Holidays Work</div>
        <div className="nhsuk-inset-text">
          <div>· All students marked <strong>PH</strong> on holiday dates</div>
          <div>· Night cycle counter does <strong>not</strong> advance on PH</div>
          <div>· Night duty students resume on next working day</div>
          <div>· Day shift postings automatically adjust forward</div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ MAIN APP ════════════════════ */
function App(){
  const[cfg,setCfg]=useState({...DEFAULTS});
  const[roster,setRoster]=useState(null);
  const[tab,setTab]=useState('setup');
  const[error,setError]=useState('');
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('nrs-theme')==='dark';}catch{return false;}});
  const device = useDevice();
  const mobile = isMobile(device);
  const tablet = isTablet(device);
  const desktop = isDesktop(device);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    try{localStorage.setItem('nrs-theme',dark?'dark':'light');}catch{}
  },[dark]);

  const handleGenerate=useCallback(()=>{
    setError(''); setRoster(null);
    try{
      const result=generateRoster(cfg);
      setRoster(result);
      setTimeout(()=>document.getElementById('output-anchor')?.scrollIntoView({behavior:'smooth',block:'start'}),120);
    }catch(e){setError(e.message);}
  },[cfg]);

  const tabs=[{id:'setup',label:'Setup'},{id:'areas',label:'Clinical Areas'},{id:'holidays',label:'Holidays'}];

  return(
    <>
      {/* NHS HEADER */}
      <header className="nhs-header no-print">
        <div className="nhs-header-logo">SSSIHMS</div>
        <div className="nhs-header-service">
          <span className="nhs-header-service-name">
            {mobile ? 'Rotation Roster' : 'Nursing Rotation Roster'}
          </span>
          {!mobile && (
            <span className="nhs-header-service-sub">PSNL Clinical Scheduler · SSSIHL College of Nursing</span>
          )}
        </div>
        <div className="nhs-header-actions">
          {roster && !mobile && (
            <span className="nhs-header-badge no-print">
              {roster.students.length} students · {roster.totalDays} days
            </span>
          )}
          <button className="theme-toggle no-print" onClick={()=>setDark(d=>!d)} title="Toggle theme">
            {dark?'☀️':'🌙'}
          </button>
        </div>
      </header>

      <main className="nhs-page">

        {/* ── INPUT PANEL ── */}
        <div className="nhs-panel no-print">
          <div className="nhs-panel-header">
            <div>
              <div className="nhs-panel-title">Rotation Configuration</div>
              <div className="nhs-panel-subtitle">Complete all sections below, then click Generate to produce the roster.</div>
            </div>
          </div>

          <nav className="nhs-tabs" aria-label="Configuration tabs">
            {tabs.map(t=>(
              <button key={t.id} className={`nhs-tab${tab===t.id?' active':''}`}
                onClick={()=>setTab(t.id)} role="tab" aria-selected={tab===t.id}>
                {t.label}
              </button>
            ))}
          </nav>

          <div className="nhs-tab-body">
            {tab==='setup'    &&<SetupTab    cfg={cfg} setCfg={setCfg}/>}
            {tab==='areas'    &&<AreasTab    cfg={cfg} setCfg={setCfg}/>}
            {tab==='holidays' &&<HolidaysTab cfg={cfg} setCfg={setCfg}/>}
          </div>

          <div className="nhs-action-bar">
            <button className="nhsuk-button nhsuk-button--primary nhsuk-button--large" onClick={handleGenerate}>
              {mobile ? '⚡ Generate Roster' : 'Generate Rotation Roster'}
            </button>
            <div className="nhs-action-bar-right">
              <button className="nhsuk-button nhsuk-button--secondary" onClick={()=>window.print()} disabled={!roster}>
                {mobile ? '🖨️ Print' : '🖨️ Print (A3 Landscape)'}
              </button>
              <button className="nhsuk-button nhsuk-button--secondary" onClick={()=>roster&&exportExcel(roster)} disabled={!roster}>
                {mobile ? '📊 Excel' : '📊 Export to Excel'}
              </button>
            </div>
          </div>
        </div>

        {/* ── ALERTS ── */}
        <div className="alerts-stack no-print" id="output-anchor">
          {error&&(
            <div className="nhsuk-error-callout">
              <div className="callout-title">⚠ There is a problem</div>
              <div className="callout-body">{error}</div>
            </div>
          )}
          {roster&&!error&&(
            <div className="nhsuk-success-callout">
              <div className="callout-title">✓ Roster generated successfully</div>
              <div className="callout-body">
                Roster created for <strong>{roster.students.length} students</strong> over <strong>{roster.totalDays} days</strong>.
                Review the roster below, then print or export to Excel.
              </div>
            </div>
          )}
        </div>

        {/* ── OUTPUT ── */}
        {!roster?(
          <div className="nhs-empty no-print">
            <div className="nhs-empty-icon">📅</div>
            <div className="nhs-empty-title">Ready to generate</div>
            <div className="nhs-empty-sub">
              Fill in the configuration above and click <strong>Generate Rotation Roster</strong> to produce the automated schedule.
            </div>
            <div className="nhs-steps">
              {[
                'Set institution details, dates and student names in Setup',
                'Configure clinical area names in Clinical Areas',
                'Add any public holidays in Holidays',
                'Click Generate — the full roster appears here',
                'Print to A3 landscape or download as Excel',
              ].map((s,i)=>(
                <div key={i} className="nhs-step">
                  <div className="nhs-step-num">{i+1}</div>
                  <span>{s}</span>
                </div>
              ))}
            </div>
          </div>
        ):(
          <>
            {/* Institution header — appears on print */}
            <div className="nhs-inst-header">
              <div className="nhs-inst-name">{roster.config.institutionName}</div>
              <div className="nhs-inst-sub">{roster.config.rotationTitle}</div>
              <div className="nhs-inst-meta">
                {roster.config.batchInfo} &nbsp;·&nbsp; A.Y. {roster.config.academicYear} &nbsp;·&nbsp; {roster.config.hospitalName}
              </div>
              <div>
                <span className="nhs-inst-period">
                  📅 {fmtLong(roster.dates[0])} to {fmtLong(roster.dates[roster.dates.length-1])} ({roster.totalDays} days)
                </span>
              </div>
            </div>

            {/* Stats row */}
            <div className="nhs-stats-row no-print">
              {[{v:roster.students.length,l:'Students'},{v:roster.totalDays,l:'Total Days'},
                {v:roster.groupSizes[0],l:'Group A'},{v:roster.groupSizes[1],l:'Group B'},
                {v:roster.groupSizes[2],l:'Group C'},{v:6,l:'Night Nights'},
              ].map(({v,l})=>(
                <div key={l} className="nhs-stat">
                  <div className="nhs-stat-val">{v}</div>
                  <div className="nhs-stat-lbl">{l}</div>
                </div>
              ))}
            </div>

            {/* Group cards */}
            <GroupCards roster={roster} dark={dark}/>

            {/* Legend */}
            <Legend cfg={roster.config}/>

            {/* Roster table */}
            <div className="nhs-section-heading">
              {mobile ? 'Roster' : 'Clinical Rotation Roster'}
              <div className="no-print" style={{display:'flex',gap:'var(--sp-2)'}}>
                {!mobile && (
                  <button className="nhsuk-button nhsuk-button--secondary nhsuk-button--small" onClick={()=>window.print()}>🖨️ Print</button>
                )}
                <button className="nhsuk-button nhsuk-button--secondary nhsuk-button--small" onClick={()=>exportExcel(roster)}>📊 Excel</button>
              </div>
            </div>
            <RosterTable roster={roster} dark={dark} device={device}/>

            {/* Student summary */}
            <div className="nhs-section-heading no-print">
              {mobile ? 'Summary' : 'Student Compliance Summary'}
            </div>
            <StudentSummary roster={roster} dark={dark} device={device}/>

            {/* Print footer */}
            <div className="nhs-print-footer">
              <div><div style={{marginBottom:32}}>________________________________</div>Signature of Subject Co-ordinator</div>
              <div style={{textAlign:'right'}}><div style={{marginBottom:32}}>________________________________</div>Signature of the Principal</div>
            </div>
          </>
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
